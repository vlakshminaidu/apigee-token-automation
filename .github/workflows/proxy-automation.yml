name: Deploy Apigee Proxy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Modules/apigee/proxies

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Build and Deploy Apigee Proxy
        run: |
          mvn clean install -Peval \
            -Dorg=internship-439613 \
            -Denv=eval \
            -Dbearer="ya29.a0ARGnu0YLjGlHViQJWA5UgFSDakFHJpEtGjPCP0MvkktOYp2xtpewlyVpYgoyVIsRintwGwlELIOBvvrl3BiOOliKFQ8cv33OUTUy3WyB7WtIjfZZvM6rZ-JHjk4QYila6jNeTNVN2t9ZahhmBHpZ9Cu1w9Vj3iFuPTLvfRpPvEHD66u74EaaXo93tV5yatznfnblcZCF-NhAaCgYKAdsSARESFQHGX2MiNC59QMzoze_nBuuhufXdFA0211" \
            -Dapigee.options=override
