name: Deploy Apigee Proxy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Modules/apigee/proxies

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build and Deploy Apigee Proxy
        run: |
          mvn clean install -Peval \
            -Dorg=apt-advantage-495505-k1 \
            -Denv=eval \
            -Dbearer="ya29.a0AT3oNZ_20CsCw2OCrtLgNvnybHudY6_KDSLDev5HCZpVOzn3B9_bEslQmVmkBsKQ56O1beWGJXUyxYL20zDcUlzL5m4XR4hTwS0WznhQiP1WBg1rX7RpUWEC1BgL4dnQ1xiEuZohbS5MSo0VDGv4vB-AxDJY_tJ8P3VyEbTV1MllfaeU2UGbP1vUrEqXzccwH9jx7VB_qHrOaCgYKAXESARISFQHGX2Mii0pKw3jX4RAUBA8eQRDHWg0211" \
            -Dapigee.options=override
