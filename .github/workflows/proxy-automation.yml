name: Deploy Apigee Proxy

on:
  push:
    branches:
      - main   # Trigger deployment when code is pushed to main
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build and Deploy Apigee Proxy
        run: mvn install -P${{ secrets.APIGEE_ENV }}
        env:
          apigee.org: ${{ secrets.APIGEE_ORG }}
          apigee.env: ${{ secrets.APIGEE_ENV }}
        
